stage: repo-assessment
template: templates/repo-assessment-template.md
artifact: repo-assessment.md
version: 1
eval_count: 3
evals:
  - id: eval-r001-repo-001
    round: 1
    stage: repo-assessment
    source_issue_ids: [ISSUE-004]
    patterns: [PAT-006]
    input_refs:
      - evals/inputs/03-original-repo.md
      - evals/inputs/01-ep-ard.md
    prompt: |
      Produce repo-assessment.md for RFE-8685. Pin release-1.1. Document pre-feature gaps
      for enterprise CA on ESC and proxy-gated trusted CA behavior.
    assertions:
      must_mention:
        - proxy
        - trusted CA
        - configmap.go
        - deployments.go
      must_cite_pre_feature_gap: true
      must_not_claim:
        - upstream SecretStore CRD changes required
    scoring:
      method: weighted_checklist
      pass_threshold: 80

  - id: eval-r001-repo-002
    round: 1
    stage: repo-assessment
    source_issue_ids: [ISSUE-003]
    patterns: [PAT-002, PAT-003]
    input_refs:
      - evals/inputs/03-original-repo.md
    prompt: |
      Document trusted CA baseline: CNO inject ConfigMap, mount path, proxy gate,
      and upstream caProvider already on branch.
    assertions:
      must_mention:
        - external-secrets-trusted-ca-bundle
        - /etc/pki/tls/certs
        - caProvider
      must_identify_package:
        - pkg/controller/external_secrets
    scoring:
      method: weighted_checklist
      pass_threshold: 80

  - id: eval-r001-repo-003
    round: 1
    stage: repo-assessment
    source_issue_ids: []
    patterns: [PAT-001]
    input_refs:
      - evals/inputs/01-ep-ard.md
    prompt: |
      Classify change tiers: operator API vs bindata operand CRD refresh.
    assertions:
      must_mention:
        - greenfield
        - bindata
      must_not_claim:
        - tier-4 upstream CRD change required for ESC field
    scoring:
      method: weighted_checklist
      pass_threshold: 80
