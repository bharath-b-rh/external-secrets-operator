apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: {{VAULT_NAMESPACE}}
spec:
  provider:
    vault:
      server: "{{VAULT_ADDR}}"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          key: "token"
          namespace: "{{VAULT_NAMESPACE}}"